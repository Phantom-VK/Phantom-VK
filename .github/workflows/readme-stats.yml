name: Update GitHub Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate stats from in-repo backend
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
          GITHUB_STATS_USERNAME: Phantom-VK
          GITHUB_STATS_INCLUDE_ALL_COMMITS: "true"
          GITHUB_STATS_TOP_LANGS_COUNT: "6"
        run: node scripts/generate-readme-stats.mjs

      - name: Commit files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git diff --cached --quiet && exit 0
          git commit -m "Update stats"
          git push
