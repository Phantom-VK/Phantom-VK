<?xml version="1.0" encoding="UTF-8"?>
<svg
  width="320"
  height="283"
  viewBox="0 0 320 283"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-labelledby="titleId descId"
>
  <title id="titleId">Phantom-VK&apos;s Top Languages</title>
  <desc id="descId">Phantom-VK&apos;s Top Languages</desc>

  <defs>
    <radialGradient id="ambient-glow" cx="0" cy="0" r="1"
      gradientUnits="userSpaceOnUse"
      gradientTransform="translate(0 0) scale(256 311)">
      <stop offset="0%"   stop-color="#58a6ff" stop-opacity="0.06" />
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"    />
    </radialGradient>
    
  </defs>

  <style>
    .header {
      font: 600 18px 'Segoe UI', Ubuntu, Sans-Serif;
      fill: #58a6ff;
      animation: fadeIn 0.8s ease-in-out forwards;
    }
    @supports (-moz-appearance: auto) { .header { font-size: 15.5px; } }

    .stat {
      font: 600 14px 'Segoe UI', Ubuntu, 'Helvetica Neue', Sans-Serif;
      fill: #c9d1d9;
    }
    @supports (-moz-appearance: auto) { .stat { font-size: 12px; } }

    .bold  { font-weight: 700; }
    .label { font: 600 11px 'Segoe UI', Ubuntu, Sans-Serif; fill: #8b949e; text-transform: uppercase; letter-spacing: 0.07em; }
    .small { font: 400 11px 'Segoe UI', Ubuntu, Sans-Serif; fill: #8b949e; }
    .lang-name { font: 400 11px 'Segoe UI', Ubuntu, Sans-Serif; fill: #c9d1d9; }

    .rank-text  { font: 800 24px 'Segoe UI', Ubuntu, Sans-Serif; fill: #c9d1d9; animation: scaleIn 0.3s ease-in-out forwards; }
    .rank-label { font: 600 9px 'Segoe UI', Ubuntu, Sans-Serif; fill: #8b949e; text-transform: uppercase; letter-spacing: 0.1em; }

    .icon { fill: #58a6ff; display: block; }

    .rank-circle-rim {
      stroke: #58a6ff; fill: none; stroke-width: 5; opacity: 0.18;
    }
    .rank-circle {
      stroke: #58a6ff;
      stroke-dasharray: 250;
      fill: none;
      stroke-width: 5;
      stroke-linecap: round;
      opacity: 0.85;
      transform-origin: -10px 8px;
      transform: rotate(-90deg);
      animation: rankSpin 1s forwards ease-in-out;
    }

    .stagger { opacity: 0; animation: fadeIn 0.3s ease-in-out forwards; }

    .lang-progress { animation: growWidth 0.6s ease-in-out forwards; }
    #rect-mask rect { animation: slideIn 1s ease-in-out forwards; }

    @keyframes fadeIn   { from { opacity: 0; } to { opacity: 1; } }
    @keyframes scaleIn  { from { transform: translate(-5px,5px) scale(0); } to { transform: translate(-5px,5px) scale(1); } }
    @keyframes rankSpin { from { stroke-dashoffset: 251; } to { stroke-dashoffset: 110; } }
    @keyframes growWidth { from { width: 0; } to { width: 100%; } }
    @keyframes slideIn   { from { width: 0; } to { width: calc(100% - 100px); } }
  </style>

  <!-- Card surface -->
  <rect x="0.5" y="0.5" rx="8"
    width="319" height="282"
    fill="#0d1117"
    stroke="#30363d" stroke-opacity="0.9"
  />
  <!-- Ambient glow overlay -->
  <rect x="0.5" y="0.5" rx="8"
    width="319" height="282"
    fill="url(#ambient-glow)"
  />

  
  <!-- Title -->
  <g data-testid="card-title" transform="translate(25, 35)">
    <text x="0" y="0" class="header" data-testid="header">Most Used Languages</text>
  </g>

  <!-- Lang rows -->
  <g data-testid="main-card-body" transform="translate(0, 55)">
    <svg data-testid="lang-items" x="25">
      
  <g transform="translate(0, 0)">
    <g class="stagger" style="animation-delay: 450ms">
      <!-- Language name -->
      <text data-testid="lang-name" x="2" y="14" class="lang-name">Python</text>
      <!-- Percent right-aligned -->
      <text x="262" y="14" text-anchor="end" class="lang-name">68%</text>

      <!-- Progress bar -->
      <svg width="260" x="0" y="19">
        <!-- Grey track -->
        <rect rx="3" ry="3" x="0" y="0" width="260" height="6"
          fill="rgba(255,255,255,0.08)"
        />
        <!-- Colored fill, animated -->
        <svg data-testid="lang-progress" width="175.65">
          <rect
            height="6"
            fill="#3572A5"
            rx="3" ry="3" x="0" y="0"
            class="lang-progress"
            style="animation-delay: 750ms;"
          />
        </svg>
      </svg>
    </g>
  </g>
  <g transform="translate(0, 36)">
    <g class="stagger" style="animation-delay: 600ms">
      <!-- Language name -->
      <text data-testid="lang-name" x="2" y="14" class="lang-name">Kotlin</text>
      <!-- Percent right-aligned -->
      <text x="262" y="14" text-anchor="end" class="lang-name">17%</text>

      <!-- Progress bar -->
      <svg width="260" x="0" y="19">
        <!-- Grey track -->
        <rect rx="3" ry="3" x="0" y="0" width="260" height="6"
          fill="rgba(255,255,255,0.08)"
        />
        <!-- Colored fill, animated -->
        <svg data-testid="lang-progress" width="45.18">
          <rect
            height="6"
            fill="#A97BFF"
            rx="3" ry="3" x="0" y="0"
            class="lang-progress"
            style="animation-delay: 900ms;"
          />
        </svg>
      </svg>
    </g>
  </g>
  <g transform="translate(0, 72)">
    <g class="stagger" style="animation-delay: 750ms">
      <!-- Language name -->
      <text data-testid="lang-name" x="2" y="14" class="lang-name">Java</text>
      <!-- Percent right-aligned -->
      <text x="262" y="14" text-anchor="end" class="lang-name">4.4%</text>

      <!-- Progress bar -->
      <svg width="260" x="0" y="19">
        <!-- Grey track -->
        <rect rx="3" ry="3" x="0" y="0" width="260" height="6"
          fill="rgba(255,255,255,0.08)"
        />
        <!-- Colored fill, animated -->
        <svg data-testid="lang-progress" width="11.50">
          <rect
            height="6"
            fill="#b07219"
            rx="3" ry="3" x="0" y="0"
            class="lang-progress"
            style="animation-delay: 1050ms;"
          />
        </svg>
      </svg>
    </g>
  </g>
  <g transform="translate(0, 108)">
    <g class="stagger" style="animation-delay: 900ms">
      <!-- Language name -->
      <text data-testid="lang-name" x="2" y="14" class="lang-name">HTML</text>
      <!-- Percent right-aligned -->
      <text x="262" y="14" text-anchor="end" class="lang-name">4.2%</text>

      <!-- Progress bar -->
      <svg width="260" x="0" y="19">
        <!-- Grey track -->
        <rect rx="3" ry="3" x="0" y="0" width="260" height="6"
          fill="rgba(255,255,255,0.08)"
        />
        <!-- Colored fill, animated -->
        <svg data-testid="lang-progress" width="10.97">
          <rect
            height="6"
            fill="#e34c26"
            rx="3" ry="3" x="0" y="0"
            class="lang-progress"
            style="animation-delay: 1200ms;"
          />
        </svg>
      </svg>
    </g>
  </g>
  <g transform="translate(0, 144)">
    <g class="stagger" style="animation-delay: 1050ms">
      <!-- Language name -->
      <text data-testid="lang-name" x="2" y="14" class="lang-name">JavaScript</text>
      <!-- Percent right-aligned -->
      <text x="262" y="14" text-anchor="end" class="lang-name">2.6%</text>

      <!-- Progress bar -->
      <svg width="260" x="0" y="19">
        <!-- Grey track -->
        <rect rx="3" ry="3" x="0" y="0" width="260" height="6"
          fill="rgba(255,255,255,0.08)"
        />
        <!-- Colored fill, animated -->
        <svg data-testid="lang-progress" width="6.65">
          <rect
            height="6"
            fill="#f1e05a"
            rx="3" ry="3" x="0" y="0"
            class="lang-progress"
            style="animation-delay: 1350ms;"
          />
        </svg>
      </svg>
    </g>
  </g>
  <g transform="translate(0, 180)">
    <g class="stagger" style="animation-delay: 1200ms">
      <!-- Language name -->
      <text data-testid="lang-name" x="2" y="14" class="lang-name">TypeScript</text>
      <!-- Percent right-aligned -->
      <text x="262" y="14" text-anchor="end" class="lang-name">1.4%</text>

      <!-- Progress bar -->
      <svg width="260" x="0" y="19">
        <!-- Grey track -->
        <rect rx="3" ry="3" x="0" y="0" width="260" height="6"
          fill="rgba(255,255,255,0.08)"
        />
        <!-- Colored fill, animated -->
        <svg data-testid="lang-progress" width="3.56">
          <rect
            height="6"
            fill="#3178c6"
            rx="3" ry="3" x="0" y="0"
            class="lang-progress"
            style="animation-delay: 1500ms;"
          />
        </svg>
      </svg>
    </g>
  </g>
    </svg>
  </g>
</svg>