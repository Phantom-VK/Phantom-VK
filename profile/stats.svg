  </g>
    </svg>
  </g>

  <!-- Rank circle -->
  
  <g data-testid="rank-circle" transform="translate(422, 167)">
    <!-- Rim -->
    <circle class="rank-circle-rim" cx="0" cy="0" r="40" />
    <!-- Animated arc -->
    <circle
      class="rank-circle"
      cx="0" cy="0" r="40"
      style="
        stroke-dasharray: 251;
        stroke-dashoffset: -1300.18;
        transform-origin: 0px 0px;
        transform: rotate(-90deg);
        animation: rankSpin 1s forwards ease-in-out;
      "
    />
    <!-- Rank letter -->
    <g class="rank-text">
      <text x="0" y="0"
        alignment-baseline="middle"
        dominant-baseline="middle"
        text-anchor="middle"
        data-testid="level-rank-icon"
        dy="0.06em"
      >B</text>
    </g>
    <!-- RANK label below letter -->
    <text x="0" y="18"
      text-anchor="middle"
      class="rank-label"
    >RANK</text>
  </g>
</svg>